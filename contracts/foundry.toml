[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200

# Lint exclusions, justified:
#  - block-timestamp: commit/reveal deadlines are time-based by design; a few
#    seconds of validator drift is immaterial to minute-scale coordination windows.
#  - unsafe-typecast: the uint64 deadline casts are runtime-guarded by the
#    DeadlineOverflow check in createRound, so they cannot truncate.
[lint]
exclude_lints = ["block-timestamp", "unsafe-typecast"]

# Pharos Atlantic Testnet (chainId 688689). The endpoint is read from the RPC env
# var (a ZAN keyed URL, e.g. https://api.zan.top/node/v1/pharos/atlantic/<KEY>) so
# deploys can be repointed with a single .env edit.
[rpc_endpoints]
pharos = "${RPC}"
